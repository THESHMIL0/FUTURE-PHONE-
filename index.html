<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web OS Premium</title>
    <style>
        /* --- 1. CORE VARIABLES & SETUP --- */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --blur: blur(15px);
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --text-light: #ffffff;
            --text-dark: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Prevent text selection for native app feel */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- 2. DEVICE FRAME --- */
        #device {
            width: 375px;
            height: 812px;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop') center/cover;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 10px #000, 0 20px 50px rgba(0,0,0,0.5);
            transition: background 0.5s ease;
        }

        /* Make it full screen on actual mobile devices */
        @media (max-width: 400px) {
            #device {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
        }

        /* --- 3. SYSTEM SCREENS (Boot, Lock, Home) --- */
        .screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            transition: opacity 0.5s ease, transform 0.5s var(--spring);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        /* Boot Screen */
        #boot-screen {
            background: #000;
            color: white;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .apple-logo { font-size: 50px; margin-bottom: 20px; }
        .loading-bar { width: 150px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .loading-fill { width: 0%; height: 100%; background: white; transition: width 1.5s ease; }

        /* Lock Screen */
        #lock-screen {
            z-index: 50;
            align-items: center;
            padding-top: 100px;
            backdrop-filter: var(--blur);
            background: rgba(0,0,0,0.2);
        }
        .time { font-size: 70px; color: white; font-weight: 200; }
        .date { font-size: 20px; color: white; margin-bottom: 50px; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: auto; margin-bottom: 100px; }
        .pin-btn { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: var(--glass-bg); color: white; font-size: 24px;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--blur);
            transition: transform 0.1s;
        }
        .pin-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.5); }

        /* Home Screen */
        #home-screen {
            z-index: 10;
            padding: 60px 20px;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 15px;
        }
        .app-icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s var(--spring);
        }
        .app-icon-wrapper:active { transform: scale(0.85); }
        .app-icon {
            width: 60px; height: 60px; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; margin-bottom: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .app-label { color: white; font-size: 11px; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

        /* App Colors */
        .bg-notes { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); }
        .bg-settings { background: linear-gradient(135deg, #a8caba 0%, #5d4157 100%); }
        .bg-store { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .bg-calc { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }

        /* --- 4. APPS & WINDOW MANAGER --- */
        #app-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 20;
            pointer-events: none; /* Let clicks pass through when no app is open */
        }
        
        .app-view {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #f0f0f0;
            transform: translateY(100%) scale(0.9);
            opacity: 0;
            transition: all 0.4s var(--spring);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
        }

        .app-view.active {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        /* App UI Elements */
        .app-header {
            padding: 40px 20px 15px;
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
        .app-content { padding: 20px; flex: 1; overflow-y: auto; }
        
        /* Home Indicator (Swipe up to close) */
        .home-indicator {
            position: absolute;
            bottom: 10px; left: 50%;
            transform: translateX(-50%);
            width: 130px; height: 5px;
            background: #000;
            border-radius: 10px;
            z-index: 30;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .app-view.active ~ .home-indicator { opacity: 1; pointer-events: auto; }

        /* App Specific Styles */
        textarea { width: 100%; height: 100%; border: none; background: transparent; resize: none; font-size: 16px; outline: none; }
        button.btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #007aff; color: white; font-size: 16px; margin-bottom: 10px; transition: transform 0.1s; }
        button.btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="device">
        
        <div id="boot-screen" class="screen">
            <div class="apple-logo"></div>
            <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
        </div>

        <div id="lock-screen" class="screen hidden">
            <div class="time" id="clock">10:00</div>
            <div class="date">Friday, March 27</div>
            <div style="color: white; font-size: 14px; margin-bottom: 10px;">Enter PIN: 1234</div>
            <div class="pin-pad">
                <div class="pin-btn" onclick="enterPin(1)">1</div>
                <div class="pin-btn" onclick="enterPin(2)">2</div>
                <div class="pin-btn" onclick="enterPin(3)">3</div>
                <div class="pin-btn" onclick="enterPin(4)">4</div>
                <div class="pin-btn" onclick="enterPin(5)">5</div>
                <div class="pin-btn" onclick="enterPin(6)">6</div>
                <div class="pin-btn" onclick="enterPin(7)">7</div>
                <div class="pin-btn" onclick="enterPin(8)">8</div>
                <div class="pin-btn" onclick="enterPin(9)">9</div>
                <div></div>
                <div class="pin-btn" onclick="enterPin(0)">0</div>
                <div></div>
            </div>
        </div>

        <div id="home-screen" class="screen hidden">
            <div class="app-grid">
                <div class="app-icon-wrapper" onclick="openApp('notes-app')">
                    <div class="app-icon bg-notes">📝</div>
                    <div class="app-label">Notes</div>
                </div>
                <div class="app-icon-wrapper" onclick="openApp('settings-app')">
                    <div class="app-icon bg-settings">⚙️</div>
                    <div class="app-label">Settings</div>
                </div>
                <div class="app-icon-wrapper" onclick="openApp('store-app')">
                    <div class="app-icon bg-store">🛍️</div>
                    <div class="app-label">App Store</div>
                </div>
                <div class="app-icon-wrapper hidden" id="calc-icon" onclick="openApp('calc-app')">
                    <div class="app-icon bg-calc">🧮</div>
                    <div class="app-label">Calc</div>
                </div>
            </div>
        </div>

        <div id="app-container">
            
            <div class="app-view" id="notes-app">
                <div class="app-header">Notes</div>
                <div class="app-content">
                    <textarea id="notes-input" placeholder="Type your notes here... They will save automatically."></textarea>
                </div>
            </div>

            <div class="app-view" id="settings-app">
                <div class="app-header">Settings</div>
                <div class="app-content">
                    <h3 style="margin-bottom: 15px;">Wallpapers</h3>
                    <button class="btn" style="background: #e66465;" onclick="changeWallpaper('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop')">Default Abstract</button>
                    <button class="btn" style="background: #2a5298;" onclick="changeWallpaper('https://images.unsplash.com/photo-1506744626753-dba37c19e9fc?q=80&w=1000&auto=format&fit=crop')">Ocean View</button>
                    <button class="btn" style="background: #232526;" onclick="changeWallpaper('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=1000&auto=format&fit=crop')">Dark Minimal</button>
                </div>
            </div>

            <div class="app-view" id="store-app">
                <div class="app-header">App Store</div>
                <div class="app-content">
                    <div style="background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div class="app-icon bg-calc" style="width: 40px; height: 40px; font-size: 20px; margin:0;">🧮</div>
                            <div>
                                <strong style="display:block;">Calculator</strong>
                                <span style="font-size: 12px; color: gray;">Essential Math</span>
                            </div>
                        </div>
                        <button class="btn" style="width: auto; padding: 8px 15px; margin: 0; border-radius: 20px; font-weight: bold;" onclick="downloadApp('calc-icon')">GET</button>
                    </div>
                </div>
            </div>

            <div class="app-view" id="calc-app" style="background: #222; color: white;">
                <div class="app-header" style="color: black;">Calculator</div>
                <div class="app-content" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <h1 style="color: white; margin-bottom: 20px;">2 + 2 = 4</h1>
                    <p style="color: gray;">(Calculator Logic TBD)</p>
                </div>
            </div>

            <div class="home-indicator" onclick="closeApp()"></div>
        </div>

    </div>

    <script>
        /* --- STATE MANAGEMENT --- */
        let pinEntry = "";
        const correctPin = "1234";

        // Load saved state from LocalStorage on load
        window.onload = () => {
            // 1. Load Wallpaper
            const savedWP = localStorage.getItem('os_wallpaper');
            if (savedWP) document.getElementById('device').style.backgroundImage = `url('${savedWP}')`;

            // 2. Load Notes
            const savedNotes = localStorage.getItem('os_notes');
            if (savedNotes) document.getElementById('notes-input').value = savedNotes;

            // 3. Load App Ownership
            const hasCalc = localStorage.getItem('os_has_calc');
            if (hasCalc === 'true') document.getElementById('calc-icon').classList.remove('hidden');

            // Start Boot Sequence
            bootOS();
            startClock();
        };

        /* --- OS CORE FUNCTIONS --- */
        function bootOS() {
            setTimeout(() => {
                document.getElementById('loading-fill').style.width = "100%";
            }, 100);

            setTimeout(() => {
                document.getElementById('boot-screen').classList.add('hidden');
                document.getElementById('lock-screen').classList.remove('hidden');
            }, 1800);
        }

        function enterPin(num) {
            pinEntry += num;
            if (pinEntry.length === 4) {
                if (pinEntry === correctPin) {
                    // Unlock
                    document.getElementById('lock-screen').classList.add('hidden');
                    document.getElementById('home-screen').classList.remove('hidden');
                } else {
                    // Wrong PIN animation (shake could be added here)
                    alert("Wrong PIN. Try 1234.");
                }
                pinEntry = ""; // reset
            }
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                let hours = now.getHours();
                let minutes = now.getMinutes();
                minutes = minutes < 10 ? '0' + minutes : minutes;
                document.getElementById('clock').innerText = `${hours}:${minutes}`;
            }, 1000);
        }

        /* --- WINDOW MANAGER --- */
        function openApp(appId) {
            document.getElementById(appId).classList.add('active');
        }

        function closeApp() {
            // Find the currently active app and remove the active class
            const activeApp = document.querySelector('.app-view.active');
            if (activeApp) {
                activeApp.classList.remove('active');
            }
        }

        /* --- APP SPECIFIC LOGIC --- */
        
        // Settings App
        function changeWallpaper(url) {
            document.getElementById('device').style.backgroundImage = `url('${url}')`;
            localStorage.setItem('os_wallpaper', url);
            closeApp(); // Go back to home to see it
        }

        // Notes App (Auto-save)
        document.getElementById('notes-input').addEventListener('input', (e) => {
            localStorage.setItem('os_notes', e.target.value);
        });

        // App Store
        function downloadApp(iconId) {
            document.getElementById(iconId).classList.remove('hidden');
            localStorage.setItem('os_has_calc', 'true');
            alert("App Downloaded! Swipe up to go home and see it.");
        }
    </script>
</body>
</html>
